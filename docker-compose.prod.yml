# Docker Compose Production - Ferme du Vardier
# VPS Contabo: 167.86.111.192
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fermeduvardier-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fermeduvardier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fermeduvardier}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fermeduvardier} -d ${POSTGRES_DB:-fermeduvardier}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fermeduvardier-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fermeduvardier-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fermeduvardier-network

  # Backend API (Express.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fermeduvardier-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-fermeduvardier}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fermeduvardier}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://167.86.111.192}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fermeduvardier-network
    expose:
      - "3001"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://167.86.111.192/api}
    container_name: fermeduvardier-frontend
    restart: always
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://167.86.111.192}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fermeduvardier.mg}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
    depends_on:
      - backend
    networks:
      - fermeduvardier-network
    expose:
      - "3000"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: fermeduvardier-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fermeduvardier-network

volumes:
  postgres_data:
    name: fermeduvardier-postgres-data
  redis_data:
    name: fermeduvardier-redis-data

networks:
  fermeduvardier-network:
    name: fermeduvardier-network
    driver: bridge
